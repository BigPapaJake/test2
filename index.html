<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f0f0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>MAX TRACKER</title>
  <link rel="manifest" href="manifest.json" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Barlow+Condensed:wght@300;500;700;900&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f0f;
      --bg2: #1a1a1a;
      --bg3: #242424;
      --border: #2e2e2e;
      --text: #f0ede6;
      --muted: #777;
      --accent: #e8d5a3;
      --accent2: #c4a96b;
      --green: #4caf7d;
      --red: #c0392b;
      --font-d: 'Barlow Condensed', sans-serif;
      --font-m: 'Space Mono', monospace;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-m); font-size: 14px; }
    #app { display: flex; flex-direction: column; height: 100vh; max-width: 480px; margin: 0 auto; }

    header { padding: 14px 20px 10px; border-bottom: 1px solid var(--border); display: flex; align-items: baseline; gap: 10px; }
    header h1 { font-family: var(--font-d); font-weight: 900; font-size: 30px; letter-spacing: 4px; color: var(--accent); line-height: 1; }
    header .sub { font-size: 10px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }

    nav { display: flex; border-bottom: 1px solid var(--border); }
    nav button { flex: 1; padding: 11px 4px; background: none; border: none; color: var(--muted); font-family: var(--font-d); font-weight: 700; font-size: 13px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; border-bottom: 2px solid transparent; transition: color 0.15s, border-color 0.15s; }
    nav button.active { color: var(--accent); border-bottom-color: var(--accent); }
    nav button:hover { color: var(--text); }

    main { flex: 1; overflow-y: auto; padding: 20px; }
    .view { display: none; }
    .view.active { display: block; }

    /* Form elements */
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
    .form-group input, .form-group select {
      width: 100%; background: var(--bg2); border: 1px solid var(--border);
      color: var(--text); font-family: var(--font-m); font-size: 14px;
      padding: 10px 12px; border-radius: 4px; outline: none; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .form-group input:focus, .form-group select:focus { border-color: var(--accent2); }
    .form-group select option { background: var(--bg2); }

    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .btn-primary { width: 100%; background: var(--accent); color: #0f0f0f; border: none; font-family: var(--font-d); font-weight: 900; font-size: 16px; letter-spacing: 3px; text-transform: uppercase; padding: 13px; border-radius: 4px; cursor: pointer; margin-top: 6px; transition: background 0.15s; }
    .btn-primary:hover { background: var(--accent2); }
    .btn-primary:active { transform: scale(0.98); }

    .flash { background: var(--bg2); border: 1px solid var(--green); color: var(--green); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; padding: 10px 14px; border-radius: 4px; margin-top: 12px; display: none; }
    .flash.show { display: block; }

    /* Max history list */
    .exercise-block { margin-bottom: 22px; }
    .exercise-title { font-family: var(--font-d); font-weight: 900; font-size: 18px; letter-spacing: 2px; color: var(--accent); margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: baseline; }
    .exercise-title span { font-size: 11px; color: var(--muted); font-family: var(--font-m); font-weight: 400; letter-spacing: 1px; }

    .max-row { display: flex; align-items: center; justify-content: space-between; padding: 9px 12px; background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; margin-bottom: 5px; }
    .max-row .date { font-size: 11px; color: var(--muted); }
    .max-row .weight-val { font-family: var(--font-d); font-weight: 900; font-size: 22px; color: var(--accent); line-height: 1; }
    .max-row .weight-unit { font-size: 9px; color: var(--muted); font-family: var(--font-d); }
    .max-row .pr-tag { font-size: 9px; background: var(--accent); color: #0f0f0f; padding: 2px 6px; border-radius: 2px; font-family: var(--font-d); font-weight: 700; letter-spacing: 1px; }
    .btn-del { background: none; border: none; color: var(--border); cursor: pointer; font-size: 16px; padding: 0 0 0 10px; transition: color 0.15s; }
    .btn-del:hover { color: var(--red); }

    .empty { text-align: center; color: var(--muted); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; padding: 40px 0; }

    /* Graph tab */
    .graph-select { margin-bottom: 16px; }
    .chart-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; padding: 16px; margin-bottom: 16px; }
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 16px; }
    .stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; padding: 12px 10px; text-align: center; }
    .stat-card .stat-label { font-size: 9px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 4px; }
    .stat-card .stat-val { font-family: var(--font-d); font-weight: 900; font-size: 22px; color: var(--accent); line-height: 1; }
    .stat-card .stat-unit { font-size: 9px; color: var(--muted); font-family: var(--font-d); }

    /* Calculator tab */
    .calc-result { background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; padding: 16px; margin-top: 16px; }
    .calc-result .main-max { text-align: center; margin-bottom: 16px; }
    .calc-result .main-max .big { font-family: var(--font-d); font-weight: 900; font-size: 56px; color: var(--accent); line-height: 1; }
    .calc-result .main-max .label { font-size: 10px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; margin-top: 2px; }
    .formula-table { width: 100%; border-collapse: collapse; }
    .formula-table td { padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
    .formula-table td:last-child { text-align: right; font-family: var(--font-d); font-weight: 700; font-size: 15px; color: var(--text); border-bottom: none; }
    .formula-table tr:last-child td { border-bottom: none; }
    .formula-table td.formula-name { color: var(--muted); font-size: 11px; }
    .rep-scheme { margin-top: 14px; border-top: 1px solid var(--border); padding-top: 14px; }
    .rep-scheme-title { font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; }
    .rep-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid var(--bg3); font-size: 12px; }
    .rep-row .pct { color: var(--muted); }
    .rep-row .lbs { font-family: var(--font-d); font-weight: 700; font-size: 14px; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>
<div id="app">
  <header>
    <h1>MAX TRACKER</h1>
    <span class="sub">strength log</span>
  </header>
  <nav>
    <button class="active" onclick="switchTab('log')">Log Max</button>
    <button onclick="switchTab('graph')">Progress</button>
    <button onclick="switchTab('calc')">Calculator</button>
  </nav>
  <main>

    <!-- LOG MAX -->
    <div class="view active" id="view-log">
      <div class="form-group">
        <label>Exercise</label>
        <select id="log-exercise" onchange="handleCustomLog()">
          <option value="Squat">Squat</option>
          <option value="Bench Press">Bench Press</option>
          <option value="Deadlift">Deadlift</option>
          <option value="Overhead Press">Overhead Press</option>
          <option value="Barbell Row">Barbell Row</option>
          <option value="Front Squat">Front Squat</option>
          <option value="Sumo Deadlift">Sumo Deadlift</option>
          <option value="Close Grip Bench">Close Grip Bench</option>
          <option value="custom">+ Custom...</option>
        </select>
      </div>
      <div class="form-group" id="log-custom-group" style="display:none;">
        <label>Custom Exercise</label>
        <input type="text" id="log-custom" placeholder="e.g. Hack Squat" />
      </div>
      <div class="row2">
        <div class="form-group">
          <label>Max Weight (lbs)</label>
          <input type="number" id="log-weight" placeholder="315" min="0" step="5" />
        </div>
        <div class="form-group">
          <label>Date</label>
          <input type="date" id="log-date" />
        </div>
      </div>
      <div class="form-group">
        <label>Notes (optional)</label>
        <input type="text" id="log-notes" placeholder="competition, belt, sleeves..." />
      </div>
      <button class="btn-primary" onclick="logMax()">Save Max</button>
      <div class="flash" id="flash">Saved</div>
    </div>

    <!-- PROGRESS GRAPH -->
    <div class="view" id="view-graph">
      <div class="form-group graph-select">
        <label>Exercise</label>
        <select id="graph-exercise" onchange="renderGraph()"></select>
      </div>
      <div class="stat-grid" id="stat-grid"></div>
      <div class="chart-wrap">
        <canvas id="maxChart" height="200"></canvas>
      </div>
      <div id="graph-history"></div>
    </div>

    <!-- CALCULATOR -->
    <div class="view" id="view-calc">
      <div class="row2">
        <div class="form-group">
          <label>Weight Lifted (lbs)</label>
          <input type="number" id="calc-weight" placeholder="225" min="1" step="5" oninput="runCalc()" />
        </div>
        <div class="form-group">
          <label>Reps Performed</label>
          <input type="number" id="calc-reps" placeholder="5" min="1" max="30" oninput="runCalc()" />
        </div>
      </div>
      <div id="calc-result"></div>
    </div>

  </main>
</div>

<script>
const KEY = 'maxtracker_v1';
let chartInstance = null;

function load() {
  try { return JSON.parse(localStorage.getItem(KEY)) || []; } catch { return []; }
}
function save(d) { localStorage.setItem(KEY, JSON.stringify(d)); }

function switchTab(tab) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + tab).classList.add('active');
  const tabs = ['log','graph','calc'];
  document.querySelectorAll('nav button')[tabs.indexOf(tab)].classList.add('active');
  if (tab === 'graph') initGraph();
}

function handleCustomLog() {
  document.getElementById('log-custom-group').style.display =
    document.getElementById('log-exercise').value === 'custom' ? 'block' : 'none';
}

function getLogExercise() {
  const s = document.getElementById('log-exercise').value;
  return s === 'custom' ? document.getElementById('log-custom').value.trim() : s;
}

function logMax() {
  const exercise = getLogExercise();
  const weight = parseFloat(document.getElementById('log-weight').value);
  const date = document.getElementById('log-date').value;
  const notes = document.getElementById('log-notes').value.trim();
  if (!exercise || isNaN(weight) || !date) { alert('Fill in exercise, weight, and date.'); return; }

  const data = load();
  data.push({ id: Date.now(), exercise, weight, date, notes });
  data.sort((a, b) => a.date.localeCompare(b.date));
  save(data);

  const prev = data.filter(e => e.id !== data.find(x => x.id).id && e.exercise === exercise);
  const isPR = !prev.length || weight >= Math.max(...data.filter(e => e.exercise === exercise && e.id !== data[data.length-1].id).map(e => e.weight) || [0]);

  const flash = document.getElementById('flash');
  flash.textContent = isPR ? '🏆 New PR — ' + weight + ' lbs' : 'Max saved — ' + weight + ' lbs';
  flash.classList.add('show');
  setTimeout(() => flash.classList.remove('show'), 2500);

  document.getElementById('log-weight').value = '';
  document.getElementById('log-notes').value = '';
}

// Set today as default date
document.getElementById('log-date').value = new Date().toISOString().split('T')[0];

// GRAPH
function getExercises() {
  const data = load();
  return [...new Set(data.map(e => e.exercise))];
}

function initGraph() {
  const exs = getExercises();
  const sel = document.getElementById('graph-exercise');
  const cur = sel.value;
  sel.innerHTML = exs.length
    ? exs.map(e => `<option value="${e}"${e===cur?' selected':''}>${e}</option>`).join('')
    : '<option value="">No data yet</option>';
  renderGraph();
}

function renderGraph() {
  const exercise = document.getElementById('graph-exercise').value;
  const data = load().filter(e => e.exercise === exercise).sort((a,b) => a.date.localeCompare(b.date));
  const statEl = document.getElementById('stat-grid');
  const histEl = document.getElementById('graph-history');

  if (!data.length) {
    statEl.innerHTML = '';
    histEl.innerHTML = '<div class="empty">No data for this lift</div>';
    if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
    return;
  }

  const weights = data.map(e => e.weight);
  const pr = Math.max(...weights);
  const latest = weights[weights.length - 1];
  const gain = weights.length > 1 ? latest - weights[0] : 0;

  statEl.innerHTML = `
    <div class="stat-card"><div class="stat-label">Current PR</div><div class="stat-val">${pr}</div><div class="stat-unit">LBS</div></div>
    <div class="stat-card"><div class="stat-label">Latest</div><div class="stat-val">${latest}</div><div class="stat-unit">LBS</div></div>
    <div class="stat-card"><div class="stat-label">Total Gain</div><div class="stat-val" style="color:${gain>=0?'var(--green)':'var(--red)'}">${gain>0?'+':''}${gain}</div><div class="stat-unit">LBS</div></div>
  `;

  const labels = data.map(e => {
    const d = new Date(e.date + 'T00:00:00');
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  });

  const ctx = document.getElementById('maxChart').getContext('2d');
  if (chartInstance) chartInstance.destroy();
  chartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: weights,
        borderColor: '#c4a96b',
        backgroundColor: 'rgba(196,169,107,0.08)',
        borderWidth: 2,
        pointBackgroundColor: weights.map(w => w === pr ? '#e8d5a3' : '#c4a96b'),
        pointRadius: weights.map(w => w === pr ? 6 : 4),
        pointHoverRadius: 7,
        tension: 0.3,
        fill: true
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1a1a1a',
          borderColor: '#2e2e2e',
          borderWidth: 1,
          titleColor: '#e8d5a3',
          bodyColor: '#f0ede6',
          callbacks: { label: ctx => ctx.parsed.y + ' lbs' }
        }
      },
      scales: {
        x: { ticks: { color: '#777', font: { size: 10 } }, grid: { color: '#1e1e1e' } },
        y: { ticks: { color: '#777', font: { size: 10 }, callback: v => v + ' lbs' }, grid: { color: '#1e1e1e' } }
      }
    }
  });

  histEl.innerHTML = [...data].reverse().map(e => {
    const isPR = e.weight === pr;
    return `<div class="max-row">
      <div>
        <div class="date">${new Date(e.date + 'T00:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'})}</div>
        ${e.notes ? `<div style="font-size:10px;color:var(--muted);margin-top:2px;">${e.notes}</div>` : ''}
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        ${isPR ? '<span class="pr-tag">PR</span>' : ''}
        <div style="text-align:right;">
          <div class="weight-val">${e.weight}</div>
          <div class="weight-unit">LBS</div>
        </div>
        <button class="btn-del" onclick="deleteMax(${e.id})">×</button>
      </div>
    </div>`;
  }).join('');
}

function deleteMax(id) {
  save(load().filter(e => e.id !== id));
  renderGraph();
}

// CALCULATOR
function epley(w, r) { return r === 1 ? w : Math.round(w * (1 + r / 30)); }
function brzycki(w, r) { return r === 1 ? w : Math.round(w * 36 / (37 - r)); }
function lander(w, r) { return r === 1 ? w : Math.round((100 * w) / (101.3 - 2.67123 * r)); }
function lombardi(w, r) { return r === 1 ? w : Math.round(w * Math.pow(r, 0.10)); }

function runCalc() {
  const w = parseFloat(document.getElementById('calc-weight').value);
  const r = parseInt(document.getElementById('calc-reps').value);
  const el = document.getElementById('calc-result');

  if (!w || !r || r < 1 || w < 1) { el.innerHTML = ''; return; }

  const e = epley(w, r), b = brzycki(w, r), l = lander(w, r), lo = lombardi(w, r);
  const avg = Math.round((e + b + l + lo) / 4);

  const pcts = [
    [100, avg], [95, Math.round(avg * 0.95)], [90, Math.round(avg * 0.90)],
    [85, Math.round(avg * 0.85)], [80, Math.round(avg * 0.80)],
    [75, Math.round(avg * 0.75)], [70, Math.round(avg * 0.70)],
    [65, Math.round(avg * 0.65)]
  ];

  el.innerHTML = `
    <div class="calc-result">
      <div class="main-max">
        <div class="big">${avg}</div>
        <div class="label">Estimated 1RM (lbs)</div>
      </div>
      <table class="formula-table">
        <tr><td class="formula-name">Epley</td><td>${e} lbs</td></tr>
        <tr><td class="formula-name">Brzycki</td><td>${b} lbs</td></tr>
        <tr><td class="formula-name">Lander</td><td>${l} lbs</td></tr>
        <tr><td class="formula-name">Lombardi</td><td>${lo} lbs</td></tr>
      </table>
      <div class="rep-scheme">
        <div class="rep-scheme-title">Training percentages</div>
        ${pcts.map(([pct, lbs]) => `
          <div class="rep-row">
            <span class="pct">${pct}%</span>
            <span class="lbs">${lbs} lbs</span>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
